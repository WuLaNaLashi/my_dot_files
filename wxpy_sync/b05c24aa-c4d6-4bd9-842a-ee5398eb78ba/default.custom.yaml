patch:
  menu/page_size: 8
  ascii_composer/switch_key/Caps_Lock: commit_code
  switcher:
    caption: 「万象状态面板」
    hotkeys:
    save_options: # 开关记忆（方案中的 switches），从万象状态面板（而非快捷键）切换时会记住的选项，需要记忆的开关不能设定 reset
      - ascii_punct
      - s2t
      - s2hk
      - s2tw
      - emoji
      - full_shape
      - prediction
      - super_tips
      - charset_filter
      - chaifen_switch
      - tone_display
      - fuzhu_hint
      - tone_hint
      - full_pinyin
      - chinese_english
      - search_single_char
      - abbrev
    fold_options: true # 呼出时是否折叠，多方案时建议折叠 true ，一个方案建议展开 false
    abbreviate_options: true # 折叠时是否缩写选项
    option_list_separator: " / " # 折叠时的选项分隔符
